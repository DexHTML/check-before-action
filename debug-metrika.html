<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Проверка Метрики — Проверь перед действием</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Проверь перед действием</a>
    <nav class="top-nav" aria-label="Основная навигация">
      <a href="index.html">Главная</a>
      <a href="tools/proverka-zvonka.html">Проверить звонок</a>
      <a href="tools/proverka-perevoda.html">Проверить перевод</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero__content">
        <p class="eyebrow">Техническая страница</p>
        <h1>Проверка Яндекс Метрики</h1>
        <p class="lead">Эта страница нужна только для теста счётчика и событий. Она закрыта от индексации.</p>
        <div class="hero-actions">
          <button class="button button-primary" type="button" id="send-test-goal">Отправить тестовое событие</button>
          <a class="button button-secondary" href="index.html">На главную</a>
        </div>
        <p id="debug-status" class="note">Статус появится после нажатия кнопки.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Техническая страница проверки.</p>
  </footer>

  <script src="assets/js/main.js"></script>
  <script>
    document.getElementById('send-test-goal').addEventListener('click', function () {
      trackEvent('debug_metrika_test');
      document.getElementById('debug-status').textContent = 'Тестовое событие отправлено. Если счётчик не блокируется браузером, оно появится в Метрике.';
    });
  </script>
</body>
</html>
